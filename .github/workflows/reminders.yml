name: Send poll reminders

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminders endpoint
        run: |
          curl -sf -X GET "${{ vars.APP_URL }}/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
